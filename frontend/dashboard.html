<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — URL Shortener</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo"><a href="index.html" style="color:inherit;text-decoration:none">URL Shortener</a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html" class="active">Dashboard</a>
      <button class="btn-logout" onclick="logout()">Logout</button>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="dashboard-header">
      <h1>Your Links</h1>
      <a href="index.html" class="btn-primary">+ Shorten URL</a>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="stat-total">—</span>
        <span class="stat-label">Total links</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-active">—</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-clicks">—</span>
        <span class="stat-label">Total clicks</span>
      </div>
    </div>

    <div class="error-box" id="dash-error" style="display:none"></div>

    <div class="table-wrap">
      <table class="url-table">
        <thead>
          <tr>
            <th>Short URL</th>
            <th>Original URL</th>
            <th>Clicks</th>
            <th>Created</th>
            <th>Expires</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="url-tbody">
          <tr><td colspan="7" class="loading-row">Loading your links...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <button onclick="changePage(-1)" id="prev-btn">← Prev</button>
      <span id="page-info">Page 1</span>
      <button onclick="changePage(1)" id="next-btn">Next →</button>
    </div>
  </main>

  <!-- QR Modal -->
  <div class="modal-overlay" id="qr-modal" style="display:none" onclick="closeQR()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h3>QR Code</h3>
      <img id="modal-qr-img" src="" alt="QR Code" style="width:200px;height:200px;border-radius:8px;"/>
      <br/>
      <a id="modal-qr-download" download="qr.png" class="btn-secondary" style="margin-top:12px;display:inline-block">Download PNG</a>
      <br/>
      <button class="btn-ghost" style="margin-top:8px" onclick="closeQR()">Close</button>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="app.js"></script>
  <script>
    if (!localStorage.getItem('token')) window.location.href = 'login.html';
    initTheme();

    let currentPage = 1;
    const limit = 10;

    async function loadUrls() {
      document.getElementById('url-tbody').innerHTML = `<tr><td colspan="7" class="loading-row">Loading...</td></tr>`;
      try {
        const data = await api(`/my-urls?page=${currentPage}&limit=${limit}`);
        renderTable(data);
        updateStats(data);
        updatePagination(data.length);
      } catch (e) {
        if (e.message.includes('401')) logout();
        else {
          document.getElementById('dash-error').textContent = friendlyError(e.message);
          document.getElementById('dash-error').style.display = 'block';
        }
      }
    }

    function renderTable(urls) {
      const tbody = document.getElementById('url-tbody');
      if (!urls.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="loading-row">No links yet. <a href="index.html">Create one →</a></td></tr>`;
        return;
      }
      tbody.innerHTML = urls.map(u => `
        <tr class="row-${u.status}">
          <td><a href="${u.short_url}" target="_blank" class="short-link">${u.short_url.replace(/https?:\/\//, '')}</a></td>
          <td class="original-url"><a href="${u.original_url}" target="_blank" title="${u.original_url}">${truncate(u.original_url, 45)}</a></td>
          <td class="clicks">${u.click_count}</td>
          <td>${formatDate(u.created_at)}</td>
          <td>${u.expires_at ? formatDate(u.expires_at) : '—'}</td>
          <td><span class="badge badge-${u.status}">${u.status}</span></td>
          <td class="actions">
            <button class="btn-action" onclick="copyUrl('${u.short_url}')">Copy</button>
            <button class="btn-action" onclick="openQR(${u.id})">QR Code</button>
            ${u.status !== 'deleted' ? `<button class="btn-action btn-action-delete" onclick="deleteUrl(${u.id})">Delete</button>` : ''}
          </td>
        </tr>
      `).join('');
    }

    function updateStats(urls) {
      document.getElementById('stat-total').textContent = urls.length;
      document.getElementById('stat-active').textContent = urls.filter(u => u.status === 'active').length;
      document.getElementById('stat-clicks').textContent = urls.reduce((s, u) => s + u.click_count, 0);
    }

    function updatePagination(count) {
      document.getElementById('page-info').textContent = `Page ${currentPage}`;
      document.getElementById('prev-btn').disabled = currentPage === 1;
      document.getElementById('next-btn').disabled = count < limit;
    }

    function changePage(dir) {
      currentPage = Math.max(1, currentPage + dir);
      loadUrls();
    }

    async function deleteUrl(id) {
      if (!confirm('Delete this link? It will stop working immediately.')) return;
      try {
        await api(`/urls/${id}`, 'DELETE');
        showToast('Link deleted.');
        loadUrls();
      } catch (e) {
        showToast('Could not delete link.');
      }
    }

    function copyUrl(url) {
      navigator.clipboard.writeText(url);
      showToast('Copied!');
    }

    async function openQR(id) {
      const token = localStorage.getItem('token');
      const res = await fetch(`${BASE_URL}/urls/${id}/qr`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) return showToast('Could not generate QR code.');
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      document.getElementById('modal-qr-img').src = url;
      document.getElementById('modal-qr-download').href = url;
      document.getElementById('qr-modal').style.display = 'flex';
    }

    function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }
    function truncate(str, n) { return str.length > n ? str.slice(0, n) + '…' : str; }
    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    loadUrls();
  </script>
</body>
</html>
