<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — URL Shortener</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo"><a href="index.html" style="color:inherit;text-decoration:none">URL Shortener</a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login-form">
        <h2>Welcome back</h2>
        <p class="auth-sub">Log in to manage your links.</p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary full-width" id="login-btn" onclick="login()">Log in</button>
        <div class="error-box" id="login-error" style="display:none"></div>
      </div>

      <!-- Register Form -->
      <div id="register-form" style="display:none">
        <h2>Create account</h2>
        <p class="auth-sub">Start shortening with full features.</p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" />
        </div>
        <button class="btn-primary full-width" id="reg-btn" onclick="register()">Create account</button>
        <div class="error-box" id="reg-error" style="display:none"></div>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script src="app.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = 'dashboard.html';
    initTheme();

    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('reg-error').style.display = 'none';
    }

    function showAuthError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function login() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email) return showAuthError('login-error', 'Please enter your email.');
      if (!password) return showAuthError('login-error', 'Please enter your password.');
      if (!email.includes('@')) return showAuthError('login-error', 'Enter a valid email address.');

      const btn = document.getElementById('login-btn');
      btn.textContent = 'Logging in...';
      btn.disabled = true;
      document.getElementById('login-error').style.display = 'none';

      const form = new URLSearchParams();
      form.append('username', email);
      form.append('password', password);

      try {
        const res = await fetch(`${BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: form
        });
        const data = await res.json();
        if (!res.ok) {
          const msg = res.status === 401 ? 'Incorrect email or password.' : (data.detail || 'Login failed.');
          return showAuthError('login-error', msg);
        }
        localStorage.setItem('token', data.access_token);
        window.location.href = 'dashboard.html';
      } catch (e) {
        showAuthError('login-error', 'Could not connect to server. Is it running?');
      } finally {
        btn.textContent = 'Log in';
        btn.disabled = false;
      }
    }

    async function register() {
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;

      if (!email) return showAuthError('reg-error', 'Please enter an email address.');
      if (!email.includes('@')) return showAuthError('reg-error', 'Enter a valid email address.');
      if (!password) return showAuthError('reg-error', 'Please enter a password.');
      if (password.length < 6) return showAuthError('reg-error', 'Password must be at least 6 characters.');

      const btn = document.getElementById('reg-btn');
      btn.textContent = 'Creating account...';
      btn.disabled = true;
      document.getElementById('reg-error').style.display = 'none';

      try {
        const res = await fetch(`${BASE_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          const msg = res.status === 400 ? 'An account with this email already exists.' : (data.detail || 'Registration failed.');
          return showAuthError('reg-error', msg);
        }
        // auto-login after register
        document.getElementById('login-email').value = email;
        document.getElementById('login-password').value = password;
        switchTab('login');
        await login();
      } catch (e) {
        showAuthError('reg-error', 'Could not connect to server. Is it running?');
      } finally {
        btn.textContent = 'Create account';
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const loginVisible = document.getElementById('login-form').style.display !== 'none';
      loginVisible ? login() : register();
    });
  </script>
</body>
</html>
